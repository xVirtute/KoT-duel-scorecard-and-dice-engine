<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>King of Tokyo: Duel - Companion Suite</title>

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#0b0b0c">

  <script src="https://cdn.tailwindcss.com"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Bangers&display=swap" rel="stylesheet">

  <style>
    body {
      background-color: #0b0b0c;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      -webkit-user-select: none;
    }

    .viewport-lock {
      height: 100vh;
      width: 100vw;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .font-comic-heavy {
      font-family: 'Luckiest Guy', cursive;
    }

    .font-comic-clean {
      font-family: 'Bangers', cursive;
      letter-spacing: 0.05em;
    }

    .comic-box {
      border: 4px solid #000000;
      box-shadow: 6px 6px 0px #000000;
    }

    .comic-box-sm {
      border: 3px solid #000000;
      box-shadow: 3px 3px 0px #000000;
    }

    .comic-box-lg {
      border: 5px solid #000000;
      box-shadow: 8px 8px 0px #000000;
    }

    .held-style {
      border-color: #a855f7 !important;
      box-shadow: 0 0 20px 6px rgba(168, 85, 247, 0.65), 4px 4px 0px #000000 !important;
      transform: translateY(-4px);
    }

    @keyframes fastTumble {
      0% { transform: scale(1) rotate(0deg); filter: brightness(1.1); }
      50% { transform: scale(1.08) rotate(-8deg); }
      100% { transform: scale(1) rotate(8deg); }
    }

    .animate-tumble {
      animation: fastTumble 0.15s infinite alternate ease-in-out;
    }
  </style>
  
  <script src="duelEngine.js" defer></script>
</head>

<body class="text-zinc-100 min-h-screen relative flex flex-col">

  <div class="fixed top-4 right-4 z-50 bg-neutral-900/90 backdrop-blur border border-neutral-700 p-1 rounded-2xl flex items-center gap-1 shadow-2xl tracking-wider font-mono">
    <button id="nav-score" onclick="showTab('score')" class="px-4 py-2 rounded-xl text-xs font-bold uppercase transition-all bg-zinc-100 text-neutral-950 shadow">
      Score
    </button>
    <button id="nav-dice" onclick="showTab('dice')" class="px-4 py-2 rounded-xl text-xs font-bold uppercase transition-all text-neutral-400 hover:text-white">
      Dice
    </button>
    <div class="w-[1px] h-4 bg-neutral-700 mx-1"></div>
    <button onclick="toggleFullscreen()" class="p-2 text-neutral-400 hover:text-white active:scale-95 transition-all rounded-xl" title="Toggle Fullscreen">
      <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 3.75v4.5m0-4.5h4.5m-4.5 0L9 9M20.25 3.75v4.5m0-4.5h-4.5m4.5 0L15 9M3.75 20.25v-4.5m0 4.5h4.5m-4.5 0L9 15m11.25 5.25v-4.5m0 4.5h-4.5m4.5 0L15 15"></path>
      </svg>
    </button>
  </div>

  <div id="tab-score-view" class="viewport-lock flex flex-col justify-between flex-1">
    
    <div id="p1-module" class="flex-1 flex flex-col transform rotate-180 bg-neutral-950 min-h-0 transition-all duration-300">
      <div class="h-14 flex items-center justify-center bg-neutral-900/50 border-t border-neutral-800 shrink-0">
        <input type="text" id="p1-name-input" value="Gigazaur" oninput="updateResolveLabels()" class="bg-transparent text-center text-xl font-bold tracking-widest uppercase text-neutral-400 focus:outline-none focus:text-red-400 w-full font-sans transition-colors">
      </div>

      <div id="p1-standard-rows" class="flex-1 flex flex-col min-h-0">
        <div class="flex-1 flex items-center justify-between border-t border-neutral-900 bg-gradient-to-t from-emerald-950/20 to-transparent">
          <button onclick="changeScoreStat('p1', 'energy', -1)" class="h-full w-1/4 text-6xl font-light text-emerald-400 hover:bg-emerald-400/10 active:bg-emerald-400/20 transition-colors flex items-center justify-center font-mono">-</button>
          <div class="flex flex-col items-center justify-center flex-1">
            <span class="p1-energy-text text-8xl font-black text-emerald-400 tracking-tight drop-shadow-[0_0_20px_rgba(52,211,153,0.3)] transition-transform duration-100">0</span>
            <span class="text-xs uppercase tracking-widest text-emerald-400/50 font-bold mt-2">Energy</span>
          </div>
          <button onclick="changeScoreStat('p1', 'energy', 1)" class="h-full w-1/4 text-6xl font-light text-emerald-400 hover:bg-emerald-400/10 active:bg-emerald-400/20 transition-colors flex items-center justify-center font-mono">+</button>
        </div>
        <div class="flex-1 flex items-center justify-between border-t border-neutral-900 bg-gradient-to-t from-red-950/20 to-transparent">
          <button onclick="changeScoreStat('p1', 'health', -1)" class="h-full w-1/4 text-6xl font-light text-red-500 hover:bg-red-500/10 active:bg-red-500/20 transition-colors flex items-center justify-center font-mono">-</button>
          <div class="flex flex-col items-center justify-center flex-1">
            <span class="p1-health-text text-8xl font-black text-red-500 tracking-tight drop-shadow-[0_0_20px_rgba(239,68,68,0.3)] transition-transform duration-100">10</span>
            <span class="text-xs uppercase tracking-widest text-red-400/50 font-bold mt-2">Health</span>
          </div>
          <button onclick="changeScoreStat('p1', 'health', 1)" class="h-full w-1/4 text-6xl font-light text-red-500 hover:bg-red-500/10 active:bg-red-500/20 transition-colors flex items-center justify-center font-mono">+</button>
        </div>
      </div>

      <div id="p1-summary-tiles" class="hidden h-28 flex items-stretch gap-4 p-3 shrink-0">
        <div class="flex-1 bg-neutral-900 border border-red-900/40 rounded-2xl flex items-center justify-between px-4">
          <button onclick="changeScoreStat('p1', 'health', -1)" class="text-3xl font-bold text-red-500 w-10 h-10 flex items-center justify-center bg-red-950/30 rounded-xl active:bg-red-950/60 font-mono">-</button>
          <div class="flex flex-col items-center">
            <span class="p1-health-text text-3xl font-black text-red-500 transition-transform duration-100">10</span>
            <span class="text-[10px] uppercase tracking-widest text-red-400/40 font-bold">Health</span>
          </div>
          <button onclick="changeScoreStat('p1', 'health', 1)" class="text-3xl font-bold text-red-500 w-10 h-10 flex items-center justify-center bg-red-950/30 rounded-xl active:bg-red-950/60 font-mono">+</button>
        </div>
        <div class="flex-1 bg-neutral-900 border border-emerald-900/40 rounded-2xl flex items-center justify-between px-4">
          <button onclick="changeScoreStat('p1', 'energy', -1)" class="text-3xl font-bold text-emerald-400 w-10 h-10 flex items-center justify-center bg-emerald-950/30 rounded-xl active:bg-emerald-950/60 font-mono">-</button>
          <div class="flex flex-col items-center">
            <span class="p1-energy-text text-3xl font-black text-emerald-400 transition-transform duration-100">0</span>
            <span class="text-[10px] uppercase tracking-widest text-emerald-400/40 font-bold">Energy</span>
          </div>
          <button onclick="changeScoreStat('p1', 'energy', 1)" class="text-3xl font-bold text-emerald-400 w-10 h-10 flex items-center justify-center bg-emerald-950/30 rounded-xl active:bg-emerald-950/60 font-mono">+</button>
        </div>
      </div>
    </div>

    <div id="center-divider-block" class="h-2 bg-neutral-800 w-full shadow-[0_0_15px_rgba(0,0,0,0.7)] z-10 flex flex-col justify-center transition-all duration-300 shrink-0">
      <div id="summary-container" class="hidden w-full h-full flex flex-col items-center justify-center p-4 gap-4 min-h-0">
        <div id="summary-dice-grid" class="w-full flex-1 grid grid-cols-4 gap-4 items-center justify-items-center max-w-xs sm:max-w-sm mx-auto content-center min-h-0 overflow-y-auto"></div>
        <button onclick="dismissSummary()" class="w-full max-w-xs bg-red-600 hover:bg-red-500 text-white font-comic-heavy text-lg py-2.5 rounded-2xl comic-box tracking-wider active:translate-y-[2px] active:shadow-[2px_2px_0px_#000000] transition-all uppercase shrink-0">
          Dismiss Review ✕
        </button>
      </div>
    </div>

    <div id="p2-module" class="flex-1 flex flex-col bg-neutral-950 min-h-0 transition-all duration-300">
      <div class="h-14 flex items-center justify-center bg-neutral-900/50 border-b border-neutral-800 shrink-0">
        <input type="text" id="p2-name-input" value="Kraken" oninput="updateResolveLabels()" class="bg-transparent text-center text-xl font-bold tracking-widest uppercase text-neutral-400 focus:outline-none focus:text-emerald-400 w-full font-sans transition-colors">
      </div>

      <div id="p2-standard-rows" class="flex-1 flex flex-col min-h-0">
        <div class="flex-1 flex items-center justify-between border-b border-neutral-900 bg-gradient-to-b from-emerald-950/20 to-transparent">
          <button onclick="changeScoreStat('p2', 'energy', -1)" class="h-full w-1/4 text-6xl font-light text-emerald-400 hover:bg-emerald-400/10 active:bg-emerald-400/20 transition-colors flex items-center justify-center font-mono">-</button>
          <div class="flex flex-col items-center justify-center flex-1">
            <span class="p2-energy-text text-8xl font-black text-emerald-400 tracking-tight drop-shadow-[0_0_20px_rgba(52,211,153,0.3)] transition-transform duration-100">0</span>
            <span class="text-xs uppercase tracking-widest text-emerald-400/50 font-bold mt-2">Energy</span>
          </div>
          <button onclick="changeScoreStat('p2', 'energy', 1)" class="h-full w-1/4 text-6xl font-light text-emerald-400 hover:bg-emerald-400/10 active:bg-emerald-400/20 transition-colors flex items-center justify-center font-mono">+</button>
        </div>
        <div class="flex-1 flex items-center justify-between bg-gradient-to-b from-red-950/20 to-transparent">
          <button onclick="changeScoreStat('p2', 'health', -1)" class="h-full w-1/4 text-6xl font-light text-red-500 hover:bg-red-500/10 active:bg-red-500/20 transition-colors flex items-center justify-center font-mono">-</button>
          <div class="flex flex-col items-center justify-center flex-1">
            <span class="p2-health-text text-8xl font-black text-red-500 tracking-tight drop-shadow-[0_0_20px_rgba(239,68,68,0.3)] transition-transform duration-100">10</span>
            <span class="text-xs uppercase tracking-widest text-red-400/50 font-bold mt-2">Health</span>
          </div>
          <button onclick="changeScoreStat('p2', 'health', 1)" class="h-full w-1/4 text-6xl font-light text-red-500 hover:bg-red-500/10 active:bg-red-500/20 transition-colors flex items-center justify-center font-mono">+</button>
        </div>
      </div>

      <div id="p2-summary-tiles" class="hidden h-28 flex items-stretch gap-4 p-3 shrink-0">
        <div class="flex-1 bg-neutral-900 border border-emerald-900/40 rounded-2xl flex items-center justify-between px-4">
          <button onclick="changeScoreStat('p2', 'energy', -1)" class="text-3xl font-bold text-emerald-400 w-10 h-10 flex items-center justify-center bg-emerald-950/30 rounded-xl active:bg-emerald-950/60 font-mono">-</button>
          <div class="flex flex-col items-center">
            <span class="p2-energy-text text-3xl font-black text-emerald-400 transition-transform duration-100">0</span>
            <span class="text-[10px] uppercase tracking-widest text-emerald-400/40 font-bold">Energy</span>
          </div>
          <button onclick="changeScoreStat('p2', 'energy', 1)" class="text-3xl font-bold text-emerald-400 w-10 h-10 flex items-center justify-center bg-emerald-950/30 rounded-xl active:bg-emerald-950/60 font-mono">+</button>
        </div>
        <div class="flex-1 bg-neutral-900 border border-red-900/40 rounded-2xl flex items-center justify-between px-4">
          <button onclick="changeScoreStat('p2', 'health', -1)" class="text-3xl font-bold text-red-500 w-10 h-10 flex items-center justify-center bg-red-950/30 rounded-xl active:bg-red-950/60 font-mono">-</button>
          <div class="flex flex-col items-center">
            <span class="p2-health-text text-3xl font-black text-red-500 transition-transform duration-100">10</span>
            <span class="text-[10px] uppercase tracking-widest text-red-400/40 font-bold">Health</span>
          </div>
          <button onclick="changeScoreStat('p2', 'health', 1)" class="text-3xl font-bold text-red-500 w-10 h-10 flex items-center justify-center bg-red-950/30 rounded-xl active:bg-red-950/60 font-mono">+</button>
        </div>
      </div>
    </div>
  </div>

  <div id="tab-dice-view" class="viewport-lock p-4 pt-16 pb-4 max-w-4xl mx-auto hidden">
    <div id="dice-rotator" class="w-full h-full flex flex-col justify-between transition-transform duration-300 origin-center">
      
      <main class="w-full flex-1 flex flex-col gap-4 min-h-0">
        <section class="bg-zinc-900/90 comic-box rounded-xl p-3 flex items-center justify-between gap-4 shrink-0">
          <div class="flex items-center gap-3">
            <span class="font-comic-clean text-2xl text-zinc-400 uppercase">Dice Pool Size</span>
            <button onclick="toggleDiceRotation()" class="bg-zinc-800 hover:bg-zinc-700 text-yellow-400 px-3 py-1.5 rounded-xl border border-zinc-700 font-comic-heavy text-xs tracking-wider active:scale-95 transition-all flex items-center gap-1.5 shadow-md">
              <span>🔄</span> FLIP
            </button>
          </div>
          <div class="flex items-center bg-black rounded-xl p-1 border-2 border-zinc-800">
            <button onclick="adjustPoolSize(-1)" class="w-10 h-10 rounded-lg bg-zinc-800 text-rose-500 font-comic-heavy text-xl flex items-center justify-center hover:bg-zinc-700 active:scale-95 transition-all">-</button>
            <span id="pool-display" class="w-12 text-center font-comic-heavy text-2xl text-yellow-400">6</span>
            <button onclick="adjustPoolSize(1)" class="w-10 h-10 rounded-lg bg-zinc-800 text-emerald-400 font-comic-heavy text-xl flex items-center justify-center hover:bg-zinc-700 active:scale-95 transition-all">+</button>
          </div>
        </section>

        <div class="flex-1 flex flex-col gap-4 min-h-0">
          <section class="bg-zinc-900/40 border-2 border-dashed border-zinc-800 rounded-2xl p-4 flex flex-col flex-1 min-h-0">
            <div id="active-shelf" class="grid grid-cols-4 gap-3 justify-items-center items-center w-full h-full m-auto overflow-y-auto p-1"></div>
          </section>

          <section class="bg-purple-950/20 border-2 border-dashed border-purple-900/60 rounded-2xl p-4 flex flex-col flex-1 min-h-0">
            <div id="locked-shelf" class="grid grid-cols-4 gap-3 justify-items-center items-center w-full h-full m-auto overflow-y-auto p-1"></div>
          </section>
        </div>
      </main>

      <div class="w-full mt-4 flex flex-col gap-3 shrink-0">
        <div class="flex items-stretch gap-3 w-full">
          <button id="roll-btn" onclick="executeManualRoll()" class="flex-1 bg-emerald-500 hover:bg-emerald-400 text-zinc-950 font-comic-heavy text-2xl sm:text-3xl py-3 rounded-2xl comic-box-lg tracking-wide transform active:translate-y-[2px] active:shadow-[2px_2px_0px_#000000] transition-all duration-75">
            SMASH & ROLL!
          </button>
          <div class="bg-zinc-900 border-5 border-black rounded-2xl px-5 flex items-center justify-center font-comic-heavy text-2xl text-yellow-400 shadow-[8px_8px_0px_#000000]">
            <span>🎲</span><span id="roll-counter-display" class="ml-2">0</span>
          </div>
        </div>

        <div class="w-full flex gap-3">
          <button onclick="resolveDicePool('p1')" class="flex-1 bg-red-600 hover:bg-red-500 text-white font-comic-heavy text-xs py-3 rounded-xl comic-box tracking-wider active:translate-y-[2px] active:shadow-[2px_2px_0px_#000000] transition-all uppercase">
            RESOLVE FOR <span id="p1-btn-label">GIGAZAUR</span>
          </button>
          <button onclick="resolveDicePool('p2')" class="flex-1 bg-emerald-600 hover:bg-emerald-400 text-zinc-950 font-comic-heavy text-xs py-3 rounded-xl comic-box tracking-wider active:translate-y-[2px] active:shadow-[2px_2px_0px_#000000] transition-all uppercase">
            RESOLVE FOR <span id="p2-btn-label">KRAKEN</span>
          </button>
        </div>
      </div>
    </div>
  </div>

  <footer class="w-full p-2 bg-neutral-950 flex justify-center border-t border-neutral-800 shrink-0">
    <a href="https://ko-fi.com/virtute" target="_blank" class="bg-blue-600 text-white text-xs font-bold py-2 px-4 rounded-xl shadow-lg border-2 border-black flex items-center gap-2 active:scale-95 transition-all">
      ☕ Support
    </a>
  </footer>
</body>
</html>
