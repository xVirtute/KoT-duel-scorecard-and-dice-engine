<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>King of Tokyo: Duel - Companion Suite</title>

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#0b0b0c">

  <script src="https://cdn.tailwindcss.com"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Bangers&display=swap" rel="stylesheet">

  <style>
    /* Base Environment overrides */
    body {
      background-color: #0b0b0c;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      -webkit-user-select: none;
    }

    /* Prevent system bounce scrolling while keeping layouts strictly bounded */
    .viewport-lock {
      height: 100vh;
      width: 100vw;
      overflow: hidden;
    }

    /* Custom typography mappings from your Dice App */
    .font-comic-heavy {
      font-family: 'Luckiest Guy', cursive;
    }

    .font-comic-clean {
      font-family: 'Bangers', cursive;
      letter-spacing: 0.05em;
    }

    /* Comic book aesthetic shadows and borders */
    .comic-box {
      border: 4px solid #000000;
      box-shadow: 6px 6px 0px #000000;
    }

    .comic-box-sm {
      border: 3px solid #000000;
      box-shadow: 3px 3px 0px #000000;
    }

    .comic-box-lg {
      border: 5px solid #000000;
      box-shadow: 8px 8px 0px #000000;
    }

    /* Dice Freeze State Graphic effects */
    .held-style {
      border-color: #a855f7 !important;
      box-shadow: 0 0 20px 6px rgba(168, 85, 247, 0.65), 4px 4px 0px #000000 !important;
      transform: translateY(-4px);
    }

    /* Fast Tumble Animation */
    @keyframes fastTumble {
      0% {
        transform: scale(1) rotate(0deg);
        filter: brightness(1.1);
      }

      50% {
        transform: scale(1.08) rotate(-8deg);
      }

      100% {
        transform: scale(1) rotate(8deg);
      }
    }

    .animate-tumble {
      animation: fastTumble 0.15s infinite alternate ease-in-out;
    }
  </style>
</head>

<body class="text-zinc-100 min-h-screen relative">

  <div class="fixed top-4 right-4 z-50 bg-neutral-900/90 backdrop-blur border border-neutral-700 p-1 rounded-2xl flex items-center gap-1 shadow-2xl tracking-wider font-mono">
    <button id="nav-score" onclick="showTab('score')" class="px-4 py-2 rounded-xl text-xs font-bold uppercase transition-all bg-zinc-100 text-neutral-950 shadow">
      Score
    </button>
    <button id="nav-dice" onclick="showTab('dice')" class="px-4 py-2 rounded-xl text-xs font-bold uppercase transition-all text-neutral-400 hover:text-white">
      Dice
    </button>
    <div class="w-[1px] h-4 bg-neutral-700 mx-1"></div>
    <button onclick="toggleFullscreen()" class="p-2 text-neutral-400 hover:text-white active:scale-95 transition-all rounded-xl" title="Toggle Fullscreen">
      <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 3.75v4.5m0-4.5h4.5m-4.5 0L9 9M20.25 3.75v4.5m0-4.5h-4.5m4.5 0L15 9M3.75 20.25v-4.5m0 4.5h4.5m-4.5 0L9 15m11.25 5.25v-4.5m0 4.5h-4.5m4.5 0L15 15"></path>
      </svg>

        </div>
        <div class="flex-1 bg-neutral-900 border border-emerald-900/40 rounded-2xl flex items-center justify-between px-4">
          <button onclick="changeScoreStat('p1', 'energy', -1)" class="text-3xl font-bold text-emerald-400 w-10 h-10 flex items-center justify-center bg-emerald-950/30 rounded-xl active:bg-emerald-950/60 font-mono">-</button>
          <div class="flex flex-col items-center">

          <div class="flex flex-col items-center justify-center flex-1">
            <span class="p2-health-text text-8xl font-black text-red-500 tracking-tight drop-shadow-[0_0_20px_rgba(239,68,68,0.3)] transition-transform duration-100">10</span>
            <span class="text-xs uppercase tracking-widest text-red-400/50 font-bold mt-2">Health</span>
          </div>
          <button onclick="changeScoreStat('p2', 'health', 1)" class="h-full w-1/4 text-6xl font-light text-red-500 hover:bg-red-500/10 active:bg-red-500/20 transition-colors flex items-center justify-center font-mono">+</button>

      <div id="p2-summary-tiles" class="hidden h-28 flex items-stretch gap-4 p-3 shrink-0">

          <button onclick="changeScoreStat('p2', 'energy', -1)" class="text-3xl font-bold text-emerald-400 w-10 h-10 flex items-center justify-center bg-emerald-950/30 rounded-xl active:bg-emerald-950/60 font-mono">-</button>
          <div class="flex flex-col items-center">

          <button onclick="changeScoreStat('p2', 'energy', 1)" class="text-3xl font-bold text-emerald-400 w-10 h-10 flex items-center justify-center bg-emerald-950/30 rounded-xl active:bg-emerald-950/60 font-mono">+</button>
        </div>
        <div class="flex-1 bg-neutral-900 border border-red-900/40 rounded-2xl flex items-center justify-between px-4">
          <button onclick="changeScoreStat('p2', 'health', -1)" class="text-3xl font-bold text-red-500 w-10 h-10 flex items-center justify-center bg-red-950/30 rounded-xl active:bg-red-950/60 font-mono">-</button>
          <div class="flex flex-col items-center">
            <span class="p2-health-text text-3xl font-black text-red-500 transition-transform duration-100">10</span>

  <div id="tab-dice-view" class="viewport-lock p-4 pt-16 pb-4 max-w-4xl mx-auto hidden">

    <div id="dice-rotator" class="w-full h-full flex flex-col justify-between transition-transform duration-300 origin-center">

      <main class="w-full flex-1 flex flex-col gap-4 min-h-0">

        <section class="bg-zinc-900/90 comic-box rounded-xl p-3 flex items-center justify-between gap-4 shrink-0">
          <div class="flex items-center gap-3">
            <span class="font-comic-clean text-2xl text-zinc-400 uppercase">Dice Pool Size</span>
            <button onclick="toggleDiceRotation()" class="bg-zinc-800 hover:bg-zinc-700 text-yellow-400 px-3 py-1.5 rounded-xl border border-zinc-700 font-comic-heavy text-xs tracking-wider active:scale-95 transition-all flex items-center gap-1.5 shadow-md">
              <span>🔄</span> FLIP

          </div>
          <div class="flex items-center bg-black rounded-xl p-1 border-2 border-zinc-800">
            <button onclick="adjustPoolSize(-1)" class="w-10 h-10 rounded-lg bg-zinc-800 text-rose-500 font-comic-heavy text-xl flex items-center justify-center hover:bg-zinc-700 active:scale-95 transition-all">-</button>
            <span id="pool-display" class="w-12 text-center font-comic-heavy text-2xl text-yellow-400">6</span>
            <button onclick="adjustPoolSize(1)" class="w-10 h-10 rounded-lg bg-zinc-800 text-emerald-400 font-comic-heavy text-xl flex items-center justify-center hover:bg-zinc-700 active:scale-95 transition-all">+</button>

        <div class="flex-1 flex flex-col gap-4 min-h-0">

      <div class="w-full mt-4 flex flex-col gap-3 shrink-0">
        <div class="flex items-stretch gap-3 w-full">
          <button id="roll-btn" onclick="executeManualRoll()" class="flex-1 bg-emerald-500 hover:bg-emerald-400 text-zinc-950 font-comic-heavy text-2xl sm:text-3xl py-3 rounded-2xl comic-box-lg tracking-wide transform active:translate-y-[2px] active:shadow-[2px_2px_0px_#000000] transition-all duration-75">
            SMASH & ROLL!
          </button>
          <div class="bg-zinc-900 border-5 border-black rounded-2xl px-5 flex items-center justify-center font-comic-heavy text-2xl text-yellow-400 shadow-[8px_8px_0px_#000000]">
            <span>🎲</span><span id="roll-counter-display" class="ml-2">0</span>
          </div>
        </div>

        <div class="w-full flex gap-3">
          <button onclick="resolveDicePool('p1')" class="flex-1 bg-red-600 hover:bg-red-500 text-white font-comic-heavy text-xs py-3 rounded-xl comic-box tracking-wider active:translate-y-[2px] active:shadow-[2px_2px_0px_#000000] transition-all uppercase">
            RESOLVE FOR <span id="p1-btn-label">GIGAZAUR</span>
          </button>
          <button onclick="resolveDicePool('p2')" class="flex-1 bg-emerald-600 hover:bg-emerald-400 text-zinc-950 font-comic-heavy text-xs py-3 rounded-xl comic-box tracking-wider active:translate-y-[2px] active:shadow-[2px_2px_0px_#000000] transition-all uppercase">
            RESOLVE FOR <span id="p2-btn-label">KRAKEN</span>
          </button>
        </div>
      </div>
    </div>
  </div>

  <script>
    // --- MASTER DATA ARCHITECTURE (SINGLE SOURCE OF TRUTH) ---
    let gameState = {
      p1: {
        health: 10,
        energy: 0
      },
      p2: {
        health: 10,
        energy: 0
      }
    };
    let turnRollCount = 0;
    // --- VIEWPORT TAB ROUTING LOGIC ---
    function showTab(targetTab) {
      const scoreView = document.getElementById('tab-score-view');
      const diceView = document.getElementById('tab-dice-view');
      const navScore = document.getElementById('nav-score');
      const navDice = document.getElementById('nav-dice');
      if (targetTab === 'score') {
        scoreView.classList.remove('hidden');
        diceView.classList.add('hidden');
        navScore.className = "px-4 py-2 rounded-xl text-xs font-bold uppercase transition-all bg-zinc-100 text-neutral-950 shadow";
        navDice.className = "px-4 py-2 rounded-xl text-xs font-bold uppercase transition-all text-neutral-400 hover:text-white";
      } else {
        scoreView.classList.add('hidden');
        diceView.classList.remove('hidden');
        navDice.className = "px-4 py-2 rounded-xl text-xs font-bold uppercase transition-all bg-zinc-100 text-neutral-950 shadow";
        navScore.className = "px-4 py-2 rounded-xl text-xs font-bold uppercase transition-all text-neutral-400 hover:text-white";
        renderTable();
      }
    }
    // --- SCREEN INVERSION CONTROLLER ---
    function toggleDiceRotation() {
      const rotator = document.getElementById('dice-rotator');
      rotator.classList.toggle('rotate-180');
    }
    // --- UNIFIED SCORE MUTATION & RENDERING ENGINE ---
    function changeScoreStat(player, stat, amount) {
      let nextValue = gameState[player][stat] + amount;
      if (nextValue >= 0) {
        gameState[player][stat] = nextValue;
        syncDOMCounterDisplay(player, stat);
      }
    }

    function syncDOMCounterDisplay(player, stat) {
      const currentVal = gameState[player][stat];
      const matchingNodes = document.querySelectorAll(`.${player}-${stat}-text`);
      matchingNodes.forEach(node => {
        node.innerText = currentVal;
      });
    }

    function updateResolveLabels() {
      const p1Input = document.getElementById('p1-name-input').value;
      const p2Input = document.getElementById('p2-name-input').value;
      document.getElementById('p1-btn-label').innerText = (p1Input || 'GIGAZAUR').toUpperCase();
      document.getElementById('p2-btn-label').innerText = (p2Input || 'KRAKEN').toUpperCase();
    }
    // --- ARCADE DIGITAL TICKER ANIMATOR ---
    function animateScoreTicker(player, stat, finalTarget) {
      function tick() {
        let current = gameState[player][stat];
        if (current === finalTarget) {
          document.querySelectorAll(`.${player}-${stat}-text`).forEach(el => el.classList.remove('scale-110', 'text-yellow-400'));
          return;
        }
        gameState[player][stat] = (current < finalTarget) ? current + 1 : current - 1;
        syncDOMCounterDisplay(player, stat);
        document.querySelectorAll(`.${player}-${stat}-text`).forEach(el => el.classList.add('scale-110', 'text-yellow-400'));
        setTimeout(tick, 120);
      }
      tick();
    }
    // --- DICE APP CONTROLLER ENGINE ---
    const SVG_ASSETS = {
      damage: `<svg viewBox="0 0 100 100" class="w-5/6 h-5/6 text-red-500 fill-current"><circle cx="50" cy="62" r="16"/><path d="M26,44 C21,34 31,24 36,36 Z"/><path d="M42,30 C41,16 53,14 53,28 Z"/><path d="M60,32 C64,16 75,22 70,36 Z"/><path d="M76,48 C83,40 90,52 80,58 Z"/></svg>`,
      destruction: `<svg viewBox="0 0 100 100" class="w-4/5 h-4/5 text-sky-400 fill-current"><path d="M30,90 L30,15 L70,15 L70,90 Z" /><rect x="38" y="25" width="8" height="12" fill="#18181b"/><rect x="54" y="25" width="8" height="12" fill="#18181b"/><rect x="38" y="47" width="8" height="12" fill="#18181b"/><rect x="54" y="47" width="8" height="12" fill="#18181b"/><rect x="38" y="69" width="8" height="12" fill="#18181b"/><rect x="54" y="69" width="8" height="12" fill="#18181b"/></svg>`,
      energy: `<svg viewBox="0 0 100 100" class="w-4/5 h-4/5 text-yellow-400 fill-current"><polygon points="62,8 24,54 52,54 38,92 76,46 48,46"/></svg>`,
      fame: `<svg viewBox="0 0 100 100" class="w-5/6 h-5/6 text-purple-400 fill-current"><polygon points="50,8 63,38 96,38 69,58 79,90 50,70 21,90 31,58 4,38 37,38"/></svg>`,
      ability: `<svg viewBox="0 0 100 100" class="w-4/5 h-4/5 text-orange-500 fill-current"><path d="M50,10 C27.9,10 10,27.9 10,50 C10,72.1 27.9,90 50,90 C72.1,90 90,72.1 90,50 C90,27.9 72.1,10 50,10 Z M50,22 C54.4,22 55,26 54,48 C53.5,58 46.5,58 46,48 C45,26 45.6,22 50,22 Z M50,78 C45.6,78 44,74.4 44,70 C44,65.6 45.6,62 50,62 C54.4,62 56,65.6 56,70 C56,74.4 54.4,78 50,78 Z" fill-rule="evenodd"/></svg>`,
      health: `<svg viewBox="0 0 100 100" class="w-4/5 h-4/5 text-emerald-500 fill-current"><path d="M50,84 C50,84 14,60 14,36 C14,18 32,10 50,28 C68,10 86,18 86,36 C86,60 50,84 50,84 Z"/></svg>`
    };
    const FACES = ['damage', 'destruction', 'energy', 'fame', 'ability', 'health'];
    let poolSize = 6;
    let diceArray = [];
    let executionLock = false;
    const activeShelf = document.getElementById('active-shelf');
    const lockedShelf = document.getElementById('locked-shelf');
    const poolDisplay = document.getElementById('pool-display');

    function buildFreshPool() {
      diceArray = [];
      for (let i = 0; i < poolSize; i++) {
        diceArray.push({
          id: i,
          face: null,
          held: false,
          isShuffling: false
        });
      }
      renderTable();
    }

    function adjustPoolSize(delta) {
      if (executionLock) return;
      const computed = poolSize + delta;
      if (computed >= 1 && computed <= 8) {
        poolSize = computed;
        poolDisplay.innerText = poolSize;
        buildFreshPool();
      }
    }

    function toggleLockState(id) {
      if (executionLock) return;
      const target = diceArray.find(d => d.id === id);
      if (target.face === null) return;
      target.held = !target.held;
      renderTable();
    }

    function executeManualRoll() {
      if (executionLock) return;
      const rollTargets = diceArray.filter(d => !d.held);
      if (rollTargets.length === 0) return;
      turnRollCount++;
      document.getElementById('roll-counter-display').innerText = turnRollCount;
      executionLock = true;
      let tickCount = 0;
      const absoluteTicks = 8;
      const speedStep = 38;
      const shuffleTimer = setInterval(() => {
        rollTargets.forEach(die => {
          die.isShuffling = true;
          die.face = FACES[Math.floor(Math.random() * FACES.length)];
        });
        renderTable();
        tickCount++;
        if (tickCount >= absoluteTicks) {
          clearInterval(shuffleTimer);
          rollTargets.forEach(die => {
            die.isShuffling = false;
            die.face = FACES[Math.floor(Math.random() * FACES.length)];
          });
          executionLock = false;
          renderTable();
        }
      }, speedStep);
    }
    /**
     * INTERACTIVE RESOLUTION TUNNEL
     */
    function resolveDicePool(targetPlayerId) {
      if (executionLock) return;
      let diceHealthCount = 0;
      let diceEnergyCount = 0;
      let diceDamageCount = 0;
      let rolledFacesPool = [];
      diceArray.forEach(die => {
        if (die.face) rolledFacesPool.push(die.face);
        if (die.face === 'health') diceHealthCount++;
        if (die.face === 'energy') diceEnergyCount++;
        if (die.face === 'damage') diceDamageCount++;
      });
      if (rolledFacesPool.length === 0) return;
      const opponentPlayerId = (targetPlayerId === 'p1') ? 'p2' : 'p1';
      const finalHealthTarget = gameState[targetPlayerId].health + diceHealthCount;
      const finalEnergyTarget = gameState[targetPlayerId].energy + diceEnergyCount;
      let finalOpponentHealthTarget = gameState[opponentPlayerId].health - diceDamageCount;
      if (finalOpponentHealthTarget < 0) finalOpponentHealthTarget = 0;
      // Trigger structural mutation into layout Mode B (Review Mode)
      injectTurnSummaryBanner(rolledFacesPool);
      // Shift navigation view focus instantly
      showTab('score');
      // Trigger mathematical counting tickers
      setTimeout(() => {
        if (diceHealthCount > 0) animateScoreTicker(targetPlayerId, 'health', finalHealthTarget);
        if (diceEnergyCount > 0) animateScoreTicker(targetPlayerId, 'energy', finalEnergyTarget);
        if (diceDamageCount > 0) animateScoreTicker(opponentPlayerId, 'health', finalOpponentHealthTarget);
      }, 150);
      // Clean data variables out of the cup
      turnRollCount = 0;
      document.getElementById('roll-counter-display').innerText = turnRollCount;
      buildFreshPool();
    }
    /**
     * COMPresses PLAYER TILES AND OVERHAULS SCOREBOARD DIVIDER SIZING
     */
    function injectTurnSummaryBanner(faces) {
      const dividerBlock = document.getElementById('center-divider-block');
      const summaryContainer = document.getElementById('summary-container');
      const diceGrid = document.getElementById('summary-dice-grid');
      // Compact Player 1 modules
      document.getElementById('p1-standard-rows').classList.add('hidden');
      document.getElementById('p1-summary-tiles').classList.remove('hidden');
      // Compact Player 2 modules
      document.getElementById('p2-standard-rows').classList.add('hidden');
      document.getElementById('p2-summary-tiles').classList.remove('hidden');
      // Clear layout and inject newly scaled review tiles
      diceGrid.innerHTML = '';
      faces.forEach(face => {
        const dieCard = document.createElement('div');
        // Symmetrical outer border shadow matching active game engine
        dieCard.className = "aspect-square w-full rounded-2xl bg-zinc-800 border-4 border-zinc-700 flex items-center justify-center p-2 shadow-[4px_4px_0px_#000000]";
        dieCard.innerHTML = SVG_ASSETS[face];
        diceGrid.appendChild(dieCard);
      });
      // Expand center panel into the primary vertical flex container zone
      dividerBlock.className = "flex-1 bg-zinc-950 border-y-4 border-black w-full shadow-2xl z-10 flex flex-col justify-center transition-all duration-300 min-h-0";
      summaryContainer.classList.remove('hidden');
    }
    /**
     * DISMISS ACTION OVERLAY
     */
    function dismissSummary() {
      const dividerBlock = document.getElementById('center-divider-block');
      const summaryContainer = document.getElementById('summary-container');
      // Restore Player 1 stacked view
      document.getElementById('p1-standard-rows').classList.remove('hidden');
      document.getElementById('p1-summary-tiles').classList.add('hidden');
      // Restore Player 2 stacked view
      document.getElementById('p2-standard-rows').classList.remove('hidden');
      document.getElementById('p2-summary-tiles').classList.add('hidden');
      // Collapse divider row safely back into minimal 8px tabletop spacer line
      dividerBlock.className = "h-2 bg-neutral-800 w-full shadow-[0_0_15px_rgba(0,0,0,0.7)] z-10 flex flex-col justify-center transition-all duration-300 shrink-0";
      summaryContainer.classList.add('hidden');
    }

    function renderTable() {
      if (!activeShelf || !lockedShelf) return;
      activeShelf.innerHTML = '';
      lockedShelf.innerHTML = '';
      const activeUnits = diceArray.filter(d => !d.held);
      const lockedUnits = diceArray.filter(d => d.held);
      activeUnits.forEach(die => activeShelf.appendChild(generateDieMarkup(die)));
      lockedUnits.forEach(die => lockedShelf.appendChild(generateDieMarkup(die)));
    }

    function generateDieMarkup(die) {
      const block = document.createElement('button');
      let componentClasses = "aspect-square w-full max-w-[85px] rounded-2xl bg-zinc-800 border-4 border-zinc-700 flex items-center justify-center p-2 shadow-[4px_4px_0px_#000000] active:scale-95 transition-all duration-75 ";
      if (die.held) componentClasses += "held-style";
      else componentClasses += "hover:border-zinc-500";
      block.className = componentClasses;
      if (die.isShuffling) block.classList.add('animate-tumble');
      block.onclick = () => toggleLockState(die.id);
      if (die.face) block.innerHTML = SVG_ASSETS[die.face];
      else block.innerHTML = `<span class="font-comic-heavy text-3xl text-zinc-600 select-none">?</span>`;
      return block;
    }
    // --- GLOBAL FULLSCREEN CONTROLLER ---
    function toggleFullscreen() {
      if (!document.fullscreenElement && !document.webkitFullscreenElement) {
        if (document.documentElement.requestFullscreen) {
          document.documentElement.requestFullscreen();
        } else if (document.documentElement.webkitRequestFullscreen) {
          document.documentElement.webkitRequestFullscreen();
        }
      } else {
        if (document.exitFullscreen) {
          document.exitFullscreen();
        } else if (document.webkitExitFullscreen) {
          document.webkitExitFullscreen();
        }
      }
    }
    // Run baseline setup routines
    buildFreshPool();
    updateResolveLabels();
  </script>

            ☕ Buy me a coffee
        </a>
    </div>
